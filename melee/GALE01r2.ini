# libmelee bot gecko codes (GALE01r2 / NTSC 1.02)
#
# Dolphin loads these when Console(setup_gecko_codes=True) copies this file into
# the Dolphin user dir GameSettings/GALE01r2.ini. Slippi netplay installs ship a
# much larger Sys/GameSettings/GALE01r2.ini; Dolphin merges Sys + user copies and
# applies every enabled code from both. Crowd Control merges this Extract Menu
# Info block into Slippi's user-dir ini at runtime (see crowd-control slippi_gecko
# ensure_extract_menu_info_enabled). Gecko codes load only at Dolphin boot.
#
# Slippi / offline-bot findings (Crowd Control, 2026):
# - Post-game results screen streams scene halfword 0x0402 (not Menu.POSTGAME_SCORES
#   from vanilla libmelee menu_state alone). console.py maps 0x0402 -> POSTGAME_SCORES.
# - Sudden death streams scene 0x0302; map to Menu.SUDDEN_DEATH (live gameplay).
# - Offline Versus CSS uses scene 0x0002 -> Menu.CHARACTER_SELECT. Upstream
#   SendMenuFrame.asm labels P1 costume "Online" but 0x803F0E09 is the shared
#   offline CSS player struct (port spacing 0x24 bytes).
# - Slippi bundles win-screen skip (Salty Runback.asm) inside monolithic
#   $Required: General Codes in Sys; user-dir ini cannot edit Sys code bodies —
#   only [Gecko_Disabled] by name. Crowd Control re-hosts General Codes minus
#   Salty Runback under $Crowd Control General Codes no Salty Runback (see
#   crowd-control slippi_gecko.py); that patch is Slippi-netplay-specific and
#   not duplicated here.
#
# Extract Menu Info payload layout (offsets are bytes after command 0x35 at 0x0):
#   0x01-0x02  scene major/minor halfword (see scene table below)
#   0x03-0x1F  CSS cursor x/y floats (ports 1-4)
#   0x23       ready-to-fight banner (0=ready, 10=invisible)
#   0x24       stage selected flag
#   0x25-0x28  controller port status (0=human, 1=CPU, 3=off)
#   0x29-0x2C  character external ID per port
#   0x2D-0x30  coin-down state per port (2=coin down)
#   0x31,0x35  stage-select cursor floats (offline scene 0x0102 only)
#   0x39       frame counter
#   0x3D       submenu byte
#   0x3E       menu selection index
#   0x3F       port 1 costume index (Melee RAM 0x803F0E09; online + offline)
#   0x40-0x43  online nametag helper bytes (8048082x chain; not CPU levels)
#   0x44-0x48  zero-filled before EXI (was CPU level / slider; stale stack broke menuhelper)
#   0x49-0x4B  ports 2-4 costume indices (offline CSS only)
#
# Python parsing: vendor/libmelee/melee/extract_menu_info.py
# Gecko source: gecko/ExtractMenuInfo/SendMenuFrame.asm (EXI length 0x4C)
#
# Scene halfword -> libmelee Menu (console.py __handle_slippstream_menu_event):
#   0x0000 PRESS_START   0x0001 MAIN_MENU   0x0002 CHARACTER_SELECT (offline CSS)
#   0x0008 SLIPPI_ONLINE_CSS   0x0102/0x0108 STAGE_SELECT   0x0202 IN_GAME
#   0x0302 SUDDEN_DEATH   0x0402 POSTGAME_SCORES (Slippi results; was UNKNOWN_MENU)
#
# Offline CSS costume RAM (port struct base 0x803F0E08 + port*0x24; costume = base+1):
#   Port 1: 0x803F0E09 -> payload 0x3F    Port 2: 0x803F0E2D -> payload 0x49
#   Port 3: 0x803F0E51 -> payload 0x4A    Port 4: 0x803F0E75 -> payload 0x4B
#
# Prior libmelee ini builds incorrectly read base+6 (0x803F0E0E etc.) into payload
# 0x44-0x47, clobbering CPU level / slider fields and not reporting costumes.
# Recompile: ./scripts/build-gecko.py (gecko/ExtractMenuInfo/)

[Gecko_Enabled]
$Optional: Extract Menu Info
{extra_codes}
[Gecko]
$Optional: Infinite Time Mode [Fizzi]
043D4A48 00340000 #Infinite Time Mode

